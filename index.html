<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Look First</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

#menu{
  text-align:center;
}

#display{
  font-size:80vw;
  font-weight:bold;
  display:none;
  line-height:1;
  text-align:center;
}

#display.color{
  font-size:95vw;
}

button{
  font-size:30px;
  padding:16px 26px;
  margin:7px;
  border:none;
  border-radius:18px;
  background:white;
  color:black;
  font-weight:bold;
}

.option{
  background:#333;
  color:white;
}

.option.active{
  background:white;
  color:black;
}

.red{ color:#ff3b30; }
.blue{ color:#0a84ff; }
.yellow{ color:#ffd60a; }
.green{ color:#30d158; }
.white{ color:white; }
</style>
</head>

<body>

<div id="menu">
  <div>
    <button class="option mode active" data-mode="number">数字</button>
    <button class="option mode" data-mode="color">色</button>
  </div>

  <div>
    <button class="option speed" data-speed="1000">1秒</button>
    <button class="option speed active" data-speed="2000">2秒</button>
    <button class="option speed" data-speed="3000">3秒</button>
  </div>

  <button id="start">開始</button>
</div>

<div id="display">7</div>

<script>
let timer = null;
let running = false;
let speed = 2000;
let mode = "number";

let lastNumber = null;
let lastColor = null;

const menu = document.getElementById("menu");
const startBtn = document.getElementById("start");
const display = document.getElementById("display");
const speedButtons = document.querySelectorAll(".speed");
const modeButtons = document.querySelectorAll(".mode");

const colors = [
  { text:"●", cls:"red", name:"red" },
  { text:"●", cls:"blue", name:"blue" },
  { text:"●", cls:"yellow", name:"yellow" },
  { text:"●", cls:"green", name:"green" }
];

function clearClasses(){
  display.className = "";
}

function nextNumber(){
  let n;
  do {
    n = Math.floor(Math.random() * 9) + 1;
  } while(n === lastNumber);
  lastNumber = n;
  return n;
}

function nextColor(){
  let item;
  do {
    item = colors[Math.floor(Math.random() * colors.length)];
  } while(item.name === lastColor);
  lastColor = item.name;
  return item;
}

function change(){
  clearClasses();

  if(mode === "number"){
    display.textContent = nextNumber();
    display.classList.add("white");
  }

  if(mode === "color"){
  const item = nextColor();
  display.textContent = item.text;
  display.classList.add(item.cls);
  display.classList.add("color");
  }
}

speedButtons.forEach(function(button){
  button.addEventListener("click", function(e){
    e.stopPropagation();
    speedButtons.forEach(function(b){ b.classList.remove("active"); });
    button.classList.add("active");
    speed = Number(button.dataset.speed);
  });
});

modeButtons.forEach(function(button){
  button.addEventListener("click", function(e){
    e.stopPropagation();
    modeButtons.forEach(function(b){ b.classList.remove("active"); });
    button.classList.add("active");
    mode = button.dataset.mode;
  });
});

startBtn.addEventListener("click", function(e){
  e.stopPropagation();
  running = true;
  menu.style.display = "none";
  display.style.display = "block";
  change();
  timer = setInterval(change, speed);
});

document.body.addEventListener("click", function(){
  if(!running) return;
  running = false;
  clearInterval(timer);
  display.style.display = "none";
  menu.style.display = "block";
});
</script>

</body>
</html>
