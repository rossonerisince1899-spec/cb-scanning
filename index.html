<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB Scanning</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial,sans-serif;
}
#num{
  font-size:45vw;
  font-weight:bold;
}
#start{
  font-size:40px;
  padding:20px 40px;
  border-radius:20px;
  border:none;
  background:#fff;
  color:#000;
  font-weight:bold;
}
</style>
</head>
<body>
<button id="start">開始</button>
<div id="num" style="display:none;">7</div>

<script>
let timer;

function change(){
  document.getElementById("num").textContent =
    Math.floor(Math.random()*9)+1;
}

document.getElementById("start").addEventListener("click", function(){
  document.getElementById("start").style.display = "none";
  document.getElementById("num").style.display = "block";
  change();
  timer = setInterval(change,2000);
});
</script>
</body>
</html>
