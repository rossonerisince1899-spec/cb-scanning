<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB Scanning</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

#menu{
  text-align:center;
}

#num{
  font-size:45vw;
  font-weight:bold;
  display:none;
}

button{
  font-size:32px;
  padding:18px 30px;
  margin:8px;
  border:none;
  border-radius:18px;
  background:white;
  color:black;
  font-weight:bold;
}

.speed{
  background:#333;
  color:white;
}

.speed.active{
  background:white;
  color:black;
}
</style>
</head>

<body>

<div id="menu">
  <div>
    <button class="speed" data-speed="1000">1秒</button>
    <button class="speed active" data-speed="2000">2秒</button>
    <button class="speed" data-speed="3000">3秒</button>
  </div>
  <button id="start">開始</button>
</div>

<div id="num">7</div>

<script>
let timer = null;
let running = false;
let speed = 2000;

const menu = document.getElementById("menu");
const startBtn = document.getElementById("start");
const num = document.getElementById("num");
const speedButtons = document.querySelectorAll(".speed");

function change(){
  num.textContent = Math.floor(Math.random() * 9) + 1;
}

speedButtons.forEach(function(button){
  button.addEventListener("click", function(e){
    e.stopPropagation();

    speedButtons.forEach(function(b){
      b.classList.remove("active");
    });

    button.classList.add("active");
    speed = Number(button.dataset.speed);
  });
});

startBtn.addEventListener("click", function(e){
  e.stopPropagation();

  running = true;
  menu.style.display = "none";
  num.style.display = "block";

  change();
  timer = setInterval(change, speed);
});

document.body.addEventListener("click", function(){
  if(!running) return;

  running = false;
  clearInterval(timer);

  num.style.display = "none";
  menu.style.display = "block";
});
</script>

</body>
</html>
