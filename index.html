<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB Scanning</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial,sans-serif;
}
#num{
  font-size:45vw;
  font-weight:bold;
}
</style>
</head>
<body>
<div id="num">7</div>
<script>
function change(){
  document.getElementById("num").textContent =
    Math.floor(Math.random()*9)+1;
}
change();
setInterval(change,2000);
</script>
</body>
</html>
