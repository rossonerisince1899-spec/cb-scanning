<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB Scanning</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

#num{
    font-size:45vw;
    font-weight:bold;
    display:none;
}

#start{
    font-size:40px;
    padding:20px 40px;
    border:none;
    border-radius:20px;
    background:white;
    color:black;
    font-weight:bold;
}
</style>

</head>

<body>

<button id="start">開始</button>

<div id="num">7</div>

<script>

let timer=null;
let running=false;

function change(){

    document.getElementById("num").textContent=
    Math.floor(Math.random()*9)+1;

}

document.getElementById("start").onclick=function(){

    running=true;

    this.style.display="none";

    document.getElementById("num").style.display="block";

    change();

    timer=setInterval(change,2000);

}

document.body.onclick=function(){

    if(!running)return;

    running=false;

    clearInterval(timer);

    document.getElementById("num").style.display="none";

    document.getElementById("start").style.display="block";

}

</script>

</body>
</html>
