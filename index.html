<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CBスキャニング練習</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #aaa;
      --panel: #151515;
      --button: #2b2b2b;
      --button-active: #ffffff;
      --button-active-text: #000000;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #display {
      font-size: min(42vw, 42vh);
      font-weight: 900;
      line-height: 1;
      text-align: center;
      letter-spacing: 0.02em;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
      gap: 18px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
      text-align: center;
    }

    .desc {
      color: var(--muted);
      font-size: 15px;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .panel {
      background: var(--panel);
      border-radius: 18px;
      padding: 16px;
      width: min(92vw, 430px);
      box-sizing: border-box;
    }

    .label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 14px;
      background: var(--button);
      color: var(--fg);
      padding: 13px 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button.active {
      background: var(--button-active);
      color: var(--button-active-text);
    }

    #startButton {
      width: min(92vw, 430px);
      padding: 18px;
      font-size: 22px;
      background: #fff;
      color: #000;
      border-radius: 18px;
    }

    #hint {
      position: fixed;
      bottom: calc(18px + env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    .hidden {
      display: none !important;
    }

    .red { color: #ff3b30; }
    .blue { color: #0a84ff; }
    .yellow { color: #ffd60a; }
    .green { color: #30d158; }
    .white { color: #ffffff; }
  </style>
</head>
<body>
  <div id="display">▶</div>
  <div id="hint" class="hidden">タップで停止</div>

  <div id="startScreen">
    <h1>CBスキャニング練習</h1>
    <div class="desc">
      スマホを斜め後ろに置き、ボールを受ける前に首を振って表示を確認。<br>
      まずは「数字モード」で、見た数字を声に出すだけ。
    </div>

    <div class="panel">
      <div class="label">表示モード</div>
      <div class="row">
        <button class="mode active" data-mode="number">数字</button>
        <button class="mode" data-mode="color">色</button>
        <button class="mode" data-mode="arrow">矢印</button>
      </div>
    </div>

    <div class="panel">
      <div class="label">切り替え時間</div>
      <div class="row">
        <button class="speed" data-speed="1000">1秒</button>
        <button class="speed" data-speed="1500">1.5秒</button>
        <button class="speed active" data-speed="2000">2秒</button>
        <button class="speed" data-speed="3000">3秒</button>
      </div>
    </div>

    <button id="startButton">開始</button>
  </div>

  <script>
    let mode = "number";
    let speed = 2000;
    let timer = null;
    let running = false;

    const display = document.getElementById("display");
    const startScreen = document.getElementById("startScreen");
    const startButton = document.getElementById("startButton");
    const hint = document.getElementById("hint");

    const values = {
      number: ["1","2","3","4","5","6","7","8","9"],
      color: [
        { text: "赤", cls: "red" },
        { text: "青", cls: "blue" },
        { text: "黄", cls: "yellow" },
        { text: "緑", cls: "green" }
      ],
      arrow: ["←","→","↑","↓"]
    };

    function clearColorClasses() {
      display.className = "";
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function changeDisplay() {
      clearColorClasses();

      if (mode === "number") {
        display.textContent = pick(values.number);
        display.classList.add("white");
      }

      if (mode === "color") {
        const item = pick(values.color);
        display.textContent = item.text;
        display.classList.add(item.cls);
      }

      if (mode === "arrow") {
        display.textContent = pick(values.arrow);
        display.classList.add("white");
      }
    }

    function start() {
      running = true;
      startScreen.classList.add("hidden");
      hint.classList.remove("hidden");
      changeDisplay();
      timer = setInterval(changeDisplay, speed);
    }

    function stop() {
      running = false;
      clearInterval(timer);
      timer = null;
      display.textContent = "▶";
      clearColorClasses();
      hint.classList.add("hidden");
      startScreen.classList.remove("hidden");
    }

    document.querySelectorAll(".mode").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".mode").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        mode = btn.dataset.mode;
      });
    });

    document.querySelectorAll(".speed").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".speed").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        speed = Number(btn.dataset.speed);
      });
    });

    startButton.addEventListener("click", start);

    document.body.addEventListener("click", (e) => {
      if (!running) return;
      stop();
    });
  </script>
</body>
</html>
